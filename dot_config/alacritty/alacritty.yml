env:
  TERM: alacritty

import:
  - ~/.config/alacritty/themes/kanagawa.yml

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 10

window:
  startup_mode: Windowed
  dynamic_padding: true
  dynamic_title: true
  title: Alacritty
  opacity: 1

cursor:
  style:
    shape: Block
    blinking: Always
  unfocused_hollow: true
  hide_when_typing: false
  blink_interval: 500

scrolling:
  history: 1000
  multiplier: 3

selection:
  save_to_clipboard: true

output: alacritty_sync = 1
live_config_reload: true
draw_bold_text_with_bright_colors: true
